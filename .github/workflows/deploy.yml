name: Deploy to GitHub Pages

# Build the Vite app on every push to main and publish dist/ to GitHub Pages.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for the deploy-pages action to authenticate with the Pages OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Cancel any in-flight deploy when a new commit lands; only one Pages
# environment can be active at a time.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          # Vite 8 + React 19.2 require Node 20.19+ or 22.12+. Pin to 22 LTS
          # so we always satisfy that minimum without surprise bumps.
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
